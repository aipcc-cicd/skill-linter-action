name: Test Action

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-github-format:
    name: Lint (github annotations)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run skill-linter-action (github format)
        uses: ./
        with:
          path: tests/fixtures/hello-world
          format: github

  test-sarif-format:
    name: Lint (SARIF + Security tab upload)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run skill-linter-action (sarif format + auto upload)
        uses: ./
        with:
          path: tests/fixtures/hello-world
          format: sarif
          upload-sarif: true
